# Reputation Key Workflow File Rename And Import Update

## Action

Follow the file-rename-and-import-update workflow:
1. Rename the target file to the new naming convention.
2. Search for all imports of the old file name across the codebase.
3. Update each import statement to use the new file name.
4. Test affected features to ensure no import errors.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/components/features/portal/link-tree/link-tree-types.ts, src/components/features/portal/link-tree/link-tree-category-list.tsx, src/components/features/portal/link-tree/link-tree.tsx

