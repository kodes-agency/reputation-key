name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: write
  security-events: write
jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # BQC-0.1: live completion truth is the schema-validated status manifest.
      - name: BQC status manifest
        run: |
          pnpm bqc:validate-status
          pnpm bqc:generate-status
          git diff --exit-code -- \
            docs/product-readiness-program-2026-07/beta-quality-remediation-2026-07/completion-program-2026-07/STATUS.md

      - name: Run migrations
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
        run: echo "y" | pnpm auth:migrate && pnpm db:migrate

      - name: Test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          RESEND_API_KEY: re_ci_test_key_placeholder
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
        run: pnpm test

      - name: Web build
        run: pnpm build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd

      - name: Worker build
        run: pnpm build:worker

  storybook:
    runs-on: ubuntu-latest
    # BQR-5.3: hard gate. build-storybook was soft during Vite-8/Rolldown
    # instability (storybook#33063/#33747); runner builds have been green on
    # main for BQR-5.1/5.2 — promote to hard fail. storybook-test still owns
    # component render + a11y (BQR-5.4 already covered by @storybook/addon-a11y).
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Verify iframe.html produced
        run: test -f storybook-static/iframe.html

  storybook-test:
    runs-on: ubuntu-latest
    # Component-test coverage: boots Storybook, then runs the test-runner
    # (render + a11y checks across all stories) — hard gate for BQR-5.4 a11y.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Start Storybook
        run: |
          pnpm storybook --ci --quiet &
          # Robust wait without external 'wait-on' dep (avoids npx resolution flakiness/exit 127 on runners).
          for i in $(seq 1 60); do
            if curl -sf http://localhost:6006/iframe.html >/dev/null; then
              echo "Storybook ready after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:6006/iframe.html >/dev/null || (echo "Storybook failed to become ready" && exit 1)
      - name: Run storybook tests
        run: pnpm test-storybook

  e2e:
    runs-on: ubuntu-latest
    # BQR-5.1: critical Playwright project is a hard gate (auth + properties shell).
    # Residual full suite remains soft until product/UI drift is cleared (BQR-5.2).
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Required: composition root needs Redis to build jobQueue; without it
      # /api/auth/* rate-limit path throws jobQueue required → sign-in 500s.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_test_key_placeholder
      GOOGLE_CLIENT_ID: ci-placeholder-client-id
      GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
      ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
      OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
      E2E_BASE_URL: http://localhost:3000
      E2E_TEST_EMAIL: test@example.com
      E2E_TEST_PASSWORD: password123
      # Open registration + team UI for this job only (not production defaults).
      # BQC-0.3: the override boots only with this explicit execution identity
      # (the dev server pins NODE_ENV=development via the dev script).
      BETA_E2E_GLOBAL_CAPABILITIES: identity.register,organization.create,team.use
      BETA_E2E_EXECUTION_IDENTITY: playwright-e2e

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: echo "y" | pnpm auth:migrate && pnpm db:migrate
      - name: Seed E2E test user
        run: pnpm exec tsx scripts/seed-e2e-user.ts
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run critical e2e (hard gate — BQR-5.1)
        run: pnpm test:e2e --project=critical
      - name: Run full e2e suite (soft residual — BQR-5.2)
        id: e2e_full
        continue-on-error: true
        run: pnpm test:e2e --project=full
      - name: Soft-gate residual e2e
        run: |
          if [ "${{ steps.e2e_full.outcome }}" = "success" ]; then
            echo "Full e2e suite passed"
          else
            echo "::warning::Full e2e residual soft-failed (BQR-5.2). Critical path is hard-gated above."
          fi
