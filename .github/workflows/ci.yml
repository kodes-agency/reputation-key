name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run migrations
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
        run: echo "y" | pnpm auth:migrate && pnpm db:migrate

      - name: Test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          RESEND_API_KEY: re_ci_test_key_placeholder
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
        run: pnpm test

      - name: Web build
        run: pnpm build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd

      - name: Worker build
        run: pnpm build:worker

  storybook:
    runs-on: ubuntu-latest
    # Non-blocking per plan contingency 5.1: build-storybook is the known
    # Vite-8/Rolldown breakage surface (storybook#33063/#33747). Local builds
    # are green, but ubuntu-runner stability is unverified; the iframe.html
    # existence check stays as the regression sentinel. storybook-test below
    # carries the durable component-coverage signal as a hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Verify iframe.html produced
        run: test -f storybook-static/iframe.html

  storybook-test:
    runs-on: ubuntu-latest
    # Component-test coverage: boots Storybook, then runs the test-runner
    # (render + a11y checks across all stories) — the durable fix for the
    # codebase's zero-component-coverage gap.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Start Storybook
        run: |
          pnpm storybook --ci --quiet &
          # Robust wait without external 'wait-on' dep (avoids npx resolution flakiness/exit 127 on runners).
          for i in $(seq 1 60); do
            if curl -sf http://localhost:6006/iframe.html >/dev/null; then
              echo "Storybook ready after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:6006/iframe.html >/dev/null || (echo "Storybook failed to become ready" && exit 1)
      - name: Run storybook tests
        run: pnpm test-storybook

  e2e:
    runs-on: ubuntu-latest
    # Non-blocking: the 9 Playwright specs are the rendered-component proof that
    # the Phase-1 server-fn refactor preserved runtime behavior. The webServer
    # block in playwright.config.ts auto-starts `pnpm dev`. Two pre-existing
    # environmental blockers keep this non-blocking for now: (1) the register
    # server fn has a runtime failure against the seeded DB, (2) the
    # "existing credentials" spec needs a seeded test account. Re-enable as a
    # hard gate once those are resolved.
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
        run: echo "y" | pnpm auth:migrate && pnpm db:migrate
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long-for-ci
          BETTER_AUTH_URL: http://localhost:3000
          RESEND_API_KEY: re_ci_test_key_placeholder
          GOOGLE_CLIENT_ID: ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
          ENCRYPTION_KEY: aabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccddaabbccdd
          OAUTH_STATE_SECRET: aabbccddaabbccddaabbccddaabbccdd
          E2E_BASE_URL: http://localhost:3000
        run: pnpm test:e2e
