name: Fallow

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so `audit --gate new-only` can diff against the PR base.
          fetch-depth: 0

      - name: Fallow audit
        uses: fallow-rs/fallow@5b06369ef95a02f68414220b02198da409f45d3d # v3.5.0
        with:
          # Combined dead-code + complexity + duplication verdict.
          # gate: new-only fails ONLY on issues the PR introduces — the
          # 192-issue regression baseline (.fallowrc.json) never blocks.
          command: audit
          gate: new-only
