name: Fallow

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `audit --gate new-only` can diff against the PR base.
          fetch-depth: 0

      - name: Fallow audit
        uses: fallow-rs/fallow@5988b978230134388b89060a39707a501211085a # v3.7.1
        with:
          # Combined dead-code + complexity + duplication verdict.
          # gate: new-only fails ONLY on issues the PR introduces — the
          # 192-issue regression baseline (.fallowrc.json) never blocks.
          command: audit
          gate: new-only
