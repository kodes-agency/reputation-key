# Dependabot configuration — B0.4 supply chain security
# Checks for vulnerable dependencies weekly and opens PRs for updates.

version: 2
updates:
  # npm production + dev dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Group minor/patch updates to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Security updates are always opened immediately regardless of schedule
    # Major version updates get individual PRs for review
    reviewers:
      - kodes-agency/engineering
    labels:
      - dependencies
      - security

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
